<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Parts 5 & 6 — Conjunctions Quiz (B1)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f3ee;--surface:#ffffff;--border:#e0dbd0;--text:#1a1814;--muted:#7a756a;--accent:#2a6b4f;--accent-light:#e6f2ec;--accent-dark:#1a4a35;--danger:#c0392b;--danger-light:#fdf0ee;--radius:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
.container{max-width:680px;margin:0 auto}
header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
header h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.2;margin-bottom:6px}
header p{font-size:14px;color:var(--muted)}
.mode-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.tab{border:1px solid var(--border);background:transparent;border-radius:20px;padding:6px 16px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.stats-bar{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--muted)}
.stat strong{color:var(--text)}
.progress-wrap{height:3px;background:#e0dbd0;border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.q-meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.part6-context{background:#f0f4f8;border-left:3px solid #5b8db8;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#3a4a5c;line-height:1.7;margin-bottom:14px;white-space:pre-line}
.q-text{font-size:16px;line-height:1.7;color:var(--text);margin-bottom:1.25rem}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.options{grid-template-columns:1fr}}
.opt{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s;line-height:1.4}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}
.opt.correct{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark);font-weight:500}
.opt.wrong{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
.opt:disabled{cursor:default}
.feedback{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.correct-fb{background:var(--accent-light);color:var(--accent-dark);border-left:3px solid var(--accent)}
.feedback.wrong-fb{background:var(--danger-light);color:var(--danger);border-left:3px solid var(--danger)}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:1rem}
.btn{border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:9px 20px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer;transition:background .15s}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.4;cursor:default}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dark)}
.results{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 1.5rem;text-align:center}
.score-ring{width:110px;height:110px;border-radius:50%;border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.score-ring .num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--accent-dark);line-height:1}
.score-ring .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.results h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;margin-bottom:8px}
.results p{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.bd-card{background:var(--bg);border-radius:8px;padding:12px}
.bd-card .val{font-size:20px;font-weight:500;color:var(--text)}
.bd-card .key{font-size:12px;color:var(--muted);margin-top:2px}
footer{display:block;text-align:center;font-size:12px;color:var(--muted);margin-top:2rem}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>TOEIC Parts 5 &amp; 6<br>Conjunctions Quiz</h1>
    <p>B1 level &nbsp;·&nbsp; 50 questions &nbsp;·&nbsp; Linking words &amp; connectors</p>
  </header>
  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('practice')">Practice mode</button>
    <button class="tab" onclick="setMode('test')">Test mode</button>
  </div>
  <div class="stats-bar">
    <div class="stat">Question <strong id="q-counter">1 / 50</strong></div>
    <div class="stat">Score <strong id="score-disp">0 / 0</strong></div>
    <div class="stat">Part <strong id="part-disp">5</strong></div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:2%"></div></div>
  <div id="quiz-area"></div>
  <div id="results-area" style="display:none"></div>
  <div class="nav" id="nav-bar">
    <button class="btn" id="prev-btn" onclick="prevQ()">← Previous</button>
    <button class="btn primary" id="next-btn" onclick="nextQ()">Next →</button>
    <button class="btn primary" id="submit-btn" style="display:none" onclick="submitQuiz()">Submit quiz</button>
  </div>
</div>
<footer>Created for TOEIC exam preparation &nbsp;·&nbsp; B1 level</footer>

<script>
const raw=[
  {part:5,q:"The new software update improved performance, _____ it also introduced a minor display issue.",correct:"however",d:["but","so","since"],exp:'"However" contrasts two ideas formally — typical of TOEIC Part 5.'},
  {part:5,q:"_____ the weather was bad, the outdoor event went ahead as planned.",correct:"Although",d:["Because","So that","Therefore"],exp:'"Although" introduces a contrast between bad weather and the event continuing.'},
  {part:5,q:"She worked hard all year; _____, she received a promotion.",correct:"as a result",d:["although","despite","whereas"],exp:'"As a result" shows a consequence — working hard led to the promotion.'},
  {part:5,q:"The manager approved the budget _____ the team could begin the project immediately.",correct:"so that",d:["despite","however","whereas"],exp:'"So that" expresses purpose — the aim of approving the budget.'},
  {part:5,q:"Sales figures rose in Q1 _____ they dropped sharply in Q2.",correct:"whereas",d:["because","so","additionally"],exp:'"Whereas" directly contrasts two opposite situations.'},
  {part:5,q:"_____ his lack of experience, he performed surprisingly well in the interview.",correct:"Despite",d:["Although","Because","However"],exp:'"Despite" is followed by a noun phrase; "Although" needs a full clause.'},
  {part:5,q:"The project was delayed; _____, the final result exceeded expectations.",correct:"nevertheless",d:["so","as","due to"],exp:'"Nevertheless" means "despite that" — linking two contrasting ideas.'},
  {part:5,q:"Costs increased _____ a rise in raw material prices.",correct:"due to",d:["so that","whereas","nevertheless"],exp:'"Due to" + noun indicates cause.'},
  {part:5,q:"We need to reduce expenses; _____, we should look at the marketing budget first.",correct:"therefore",d:["despite","although","while"],exp:'"Therefore" introduces a logical recommendation or conclusion.'},
  {part:5,q:"_____ the new policy saves money, it may reduce employee satisfaction.",correct:"While",d:["So","Because of","Thus"],exp:'"While" (meaning "although") contrasts a financial benefit with a potential downside.'},
  {part:5,q:"The conference was interesting; _____, it ran over time.",correct:"unfortunately",d:["therefore","while","as a result"],exp:'"Unfortunately" signals a negative development — a common attitude connector in TOEIC.'},
  {part:5,q:"_____ finish the report, we stayed late in the office.",correct:"In order to",d:["So that","Because","Although"],exp:'"In order to" expresses purpose and is followed by a base verb.'},
  {part:5,q:"The team worked efficiently; _____ they met the deadline two days early.",correct:"consequently",d:["despite","however","whereas"],exp:'"Consequently" is a result connector.'},
  {part:5,q:"He joined the gym _____ lose weight before the summer.",correct:"so as to",d:["so that","because","while"],exp:'"So as to" expresses purpose and is followed by a base verb.'},
  {part:5,q:"The report was well-written; _____, the data contained several errors.",correct:"however",d:["therefore","since","also"],exp:'"However" introduces a contrasting point about the same document.'},
  {part:5,q:"_____ she had prepared carefully, she felt nervous before the presentation.",correct:"Even though",d:["Because","Therefore","As a result"],exp:'"Even though" concedes a fact while contrasting it with the result.'},
  {part:5,q:"The company expanded rapidly _____ the economic downturn.",correct:"in spite of",d:["because","so that","nevertheless"],exp:'"In spite of" + noun shows the expansion happened despite the difficulty.'},
  {part:5,q:"Prices are lower online _____ in the high-street shops.",correct:"instead of",d:["despite","whereas","as well as"],exp:'"Instead of" compares two alternatives — buying online vs. in shops.'},
  {part:5,q:"_____, she admitted that the project could have been better planned.",correct:"Personally",d:["Eventually","Furthermore","Unless"],exp:'"Personally" expresses a subjective opinion — a development/attitude connector.'},
  {part:5,q:"The new strategy worked well; _____, profits grew by 15%.",correct:"indeed",d:["however","despite","so that"],exp:'"Indeed" reinforces or confirms what was just stated.'},
  {part:5,q:"We need to hire more staff. _____, we should upgrade the equipment.",correct:"In addition",d:["However","Despite","Because"],exp:'"In addition" adds a supplementary point.'},
  {part:5,q:"She submitted the report on time _____ the power cut that morning.",correct:"despite",d:["because","so","while"],exp:'"Despite" + noun phrase shows an obstacle did not prevent the action.'},
  {part:5,q:"The product is affordable; _____, it is of high quality.",correct:"moreover",d:["however","although","since"],exp:'"Moreover" adds a further positive quality — extra information connector.'},
  {part:5,q:"_____ cutting costs, the company also aims to increase revenue.",correct:"Not only... but also",d:["Instead of","Despite","While"],exp:'"Not only... but also" pairs two complementary actions.'},
  {part:5,q:"The CEO resigned _____ allegations of financial misconduct.",correct:"because of",d:["so that","whereas","in order to"],exp:'"Because of" + noun gives a cause. "Because" would need a full clause.'},
  {part:5,q:"_____ the new regulations, all staff must complete safety training.",correct:"According to",d:["In spite of","Therefore","Although"],exp:'"According to" references a rule or source — common in formal TOEIC texts.'},
  {part:5,q:"The office will be closed on Friday; _____, you should plan accordingly.",correct:"therefore",d:["nevertheless","although","despite"],exp:'"Therefore" introduces a logical consequence or action to take.'},
  {part:5,q:"Sales were strong in Europe _____ they were weak in Asia.",correct:"whereas",d:["because","so","in order to"],exp:'"Whereas" contrasts two directly opposed situations.'},
  {part:5,q:"The project succeeded _____ the limited budget.",correct:"in spite of",d:["because","so that","while"],exp:'"In spite of" + noun shows success happened despite an obstacle.'},
  {part:5,q:"The product was launched on time _____ several technical problems.",correct:"despite",d:["because","therefore","while"],exp:'"Despite" + noun shows the launch succeeded despite the problems.'},
  {part:6,context:"[Email — HR Department to All Staff]\n\nWe are introducing a new flexible working policy.",q:"_____ (Q31), employees may now choose to work from home up to two days per week.",correct:"Furthermore",d:["However","Unless","Despite"],exp:'"Furthermore" introduces an additional positive development.'},
  {part:6,context:"[Email — HR Department to All Staff]\n\nThe new flexible working policy is now in effect.",q:"Attendance at team meetings remains mandatory, _____ (Q32) they are held remotely.",correct:"even if",d:["so that","because of","in addition"],exp:'"Even if" — attendance is required regardless of whether meetings are remote.'},
  {part:6,context:"[Report — Q3 Performance Review]\n\nOverall sales increased by 8% this quarter.",q:"_____ (Q33), the Western region recorded a 12% decline.",correct:"However",d:["Therefore","Since","Also"],exp:'"However" introduces a contrasting negative fact after the positive overall result.'},
  {part:6,context:"[Report — Q3 Performance Review]\n\nThe Western region recorded a 12% decline.",q:"The decline was _____ (Q34) a drop in consumer confidence following recent price increases.",correct:"due to",d:["so that","although","whereas"],exp:'"Due to" + noun phrase gives the cause of the decline.'},
  {part:6,context:"[Memo — Upcoming Training Day]\n\nAll employees are required to attend the training session on 14 May.",q:"_____ (Q35), transport will be provided from the main office.",correct:"Additionally",d:["However","Despite","Whereas"],exp:'"Additionally" adds a positive extra detail to the training announcement.'},
  {part:6,context:"[Memo — Upcoming Training Day]\n\nThe training session on 14 May is compulsory.",q:"Please note that the session will proceed _____ (Q36) you have a pre-approved absence.",correct:"even if",d:["so that","because","nevertheless"],exp:'"Even if" — the session goes ahead regardless of any absence.'},
  {part:6,context:"[Customer Letter]\n\nThank you for your recent purchase.",q:"_____ (Q37), we would like to inform you of a slight delay in delivery.",correct:"Unfortunately",d:["Furthermore","In order to","Whereas"],exp:'"Unfortunately" signals negative news politely — very common in formal business English.'},
  {part:6,context:"[Customer Letter]\n\nWe apologise for the inconvenience caused by the delay.",q:"The delay occurred _____ (Q38) an unexpected issue with our supplier.",correct:"because of",d:["so that","although","however"],exp:'"Because of" + noun explains the cause of the delay.'},
  {part:6,context:"[Business Proposal]\n\nOur new product offers several advantages. First, it is cost-effective.",q:"_____ (Q39), it requires minimal maintenance.",correct:"Moreover",d:["However","Despite","Consequently"],exp:'"Moreover" adds a further positive quality to the list of advantages.'},
  {part:6,context:"[Business Proposal]\n\nOur product delivers outstanding value for money.",q:"We believe this product will increase your efficiency _____ (Q40) reduce operating costs.",correct:"as well as",d:["despite","whereas","since"],exp:'"As well as" combines two benefits — typical in business proposals.'},
  {part:5,q:"The training session was useful; _____, it could have been shorter.",correct:"however",d:["therefore","since","also"],exp:'"However" introduces a contrasting opinion about the session.'},
  {part:5,q:"We reduced the price _____ attract more customers.",correct:"in order to",d:["so that","because","although"],exp:'"In order to" + base verb expresses purpose.'},
  {part:5,q:"_____ his experience, he struggled with the new software.",correct:"Despite",d:["Although","Because","Since"],exp:'"Despite" + noun shows a contrast between experience and the difficulty faced.'},
  {part:5,q:"The team finished early; _____, they started the next phase immediately.",correct:"consequently",d:["however","despite","while"],exp:'"Consequently" introduces a result — finishing early led to starting the next phase.'},
  {part:5,q:"She is fluent in English _____ French.",correct:"as well as",d:["instead of","despite","whereas"],exp:'"As well as" adds an additional item in the same category.'},
  {part:5,q:"The product was launched on time _____ several technical problems.",correct:"in spite of",d:["because","therefore","while"],exp:'"In spite of" + noun shows the launch succeeded despite the obstacles.'},
  {part:5,q:"The report is comprehensive; _____, it covers all the key data points.",correct:"indeed",d:["however","despite","whereas"],exp:'"Indeed" reinforces the positive quality already mentioned.'},
  {part:5,q:"Sales are strong in summer; _____, winter figures remain low.",correct:"nevertheless",d:["therefore","since","although"],exp:'"Nevertheless" contrasts the low winter figures with the strong summer performance.'},
  {part:5,q:"The company grew rapidly _____ it invested heavily in marketing.",correct:"because",d:["despite","whereas","in spite of"],exp:'"Because" + clause gives the reason for the company\'s growth.'},
  {part:5,q:"The new policy will save money. _____, it will improve staff morale.",correct:"Furthermore",d:["However","Despite","Whereas"],exp:'"Furthermore" adds an additional benefit — a typical extra information connector.'}
];

const pos=[2,0,3,1,2,3,0,1,2,0,3,1,0,2,1,3,0,2,1,3,2,0,3,1,0,3,1,2,3,0,1,3,0,2,1,0,2,3,1,2,0,3,1,2,0,3,1,2,0,1];
const questions=raw.map((q,i)=>{const p=pos[i];const opts=[...q.d];opts.splice(p,0,q.correct);return{...q,opts,ans:p};});

let current=0,answers=new Array(50).fill(null),mode='practice';

function setMode(m){mode=m;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='practice')||(i===1&&m==='test')));renderQ();}

function renderQ(){
  const q=questions[current];
  document.getElementById('q-counter').textContent=(current+1)+' / 50';
  document.getElementById('part-disp').textContent=q.part;
  const ans=answers.filter(a=>a!==null).length;
  const cor=answers.filter((a,i)=>a===questions[i].ans).length;
  document.getElementById('score-disp').textContent=cor+' / '+ans;
  document.getElementById('prog').style.width=((current+1)/50*100).toFixed(0)+'%';
  document.getElementById('prev-btn').disabled=current===0;
  document.getElementById('next-btn').style.display=current<49?'inline-block':'none';
  document.getElementById('submit-btn').style.display=current===49?'inline-block':'none';
  const ctx=q.context?`<div class="part6-context">${q.context}</div>`:'';
  const opts=q.opts.map((o,i)=>{
    let c='opt';
    if(answers[current]!==null){if(i===q.ans)c+=' correct';else if(i===answers[current])c+=' wrong';}
    return`<button class="${c}" onclick="choose(${i})" ${answers[current]!==null?'disabled':''}>${String.fromCharCode(65+i)}.&nbsp;${o}</button>`;
  }).join('');
  let fc='feedback',fh='';
  if(answers[current]!==null&&mode==='practice'){
    const ok=answers[current]===q.ans;
    fc+=ok?' show correct-fb':' show wrong-fb';
    fh=ok?'✓ Correct — '+q.exp:'✗ The correct answer is <strong>'+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans]+'</strong>. '+q.exp;
  }
  document.getElementById('quiz-area').innerHTML=`<div class="question-card"><div class="q-meta">Question ${current+1} &nbsp;·&nbsp; Part ${q.part}</div>${ctx}<div class="q-text">${q.q}</div><div class="options">${opts}</div><div class="${fc}">${fh}</div></div>`;
}

function choose(i){if(answers[current]!==null)return;answers[current]=i;renderQ();}
function nextQ(){if(current<49){current++;renderQ();}}
function prevQ(){if(current>0){current--;renderQ();}}

function submitQuiz(){
  const cor=answers.filter((a,i)=>a!==null&&a===questions[i].ans).length;
  const ans=answers.filter(a=>a!==null).length;
  const p5c=answers.filter((a,i)=>questions[i].part===5&&a===questions[i].ans).length;
  const p5t=questions.filter(q=>q.part===5).length;
  const p6c=answers.filter((a,i)=>questions[i].part===6&&a===questions[i].ans).length;
  const p6t=questions.filter(q=>q.part===6).length;
  const pct=Math.round(cor/50*100);
  const msg=pct>=80?'Excellent work!':pct>=60?'Good effort — keep practising!':'Keep working on those connectors!';
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('nav-bar').style.display='none';
  const ra=document.getElementById('results-area');
  ra.style.display='block';
  ra.innerHTML=`<div class="results"><div class="score-ring"><span class="num">${cor}/50</span><span class="lbl">score</span></div><h2>${msg}</h2><p>${pct}% correct &nbsp;·&nbsp; ${ans} questions answered</p><div class="breakdown"><div class="bd-card"><div class="val">${pct}%</div><div class="key">Overall</div></div><div class="bd-card"><div class="val">${p5c}/${p5t}</div><div class="key">Part 5</div></div><div class="bd-card"><div class="val">${p6c}/${p6t}</div><div class="key">Part 6</div></div><div class="bd-card"><div class="val">${50-ans}</div><div class="key">Unanswered</div></div></div><button class="btn primary" onclick="restartQuiz()">Try again</button></div>`;
}

function restartQuiz(){answers=new Array(50).fill(null);current=0;document.getElementById('quiz-area').style.display='block';document.getElementById('nav-bar').style.display='flex';document.getElementById('results-area').style.display='none';renderQ();}

renderQ();
</script>
</body>
</html>
